  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        if (!entry.compressed && entry.mime.indexOf('image/') === 0) {
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' + entry.data;
          return;
        }
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  <script type="__bundler/template">
"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n\n\n<script src=\"37c1788c-e43b-4a0b-b47d-b4552a04006a\"><\u002Fscript>\n<\u002Fhead>\n<body>\n\n<x-dc>\n<helmet>\n  <style>/* ============================================================\n   CloudCannon Design System — Foundations\n   Reconciled against the production stylesheets\n   (redesign/bem/_variables.scss, _typography.scss).\n   Swiss-editorial software UI: light mode, flat fills, 2px borders.\n\n   Canonical product variables use the --color-* / --font-size-* names.\n   Friendlier aliases (--cc-blue, --t-base, --radius…) are provided too.\n   ============================================================ */\n\n:root {\n  /* ---------- Grid / structural ---------- */\n  --grid-size: 4px;\n  --border-radius-single: 8px;\n  --border-radius: 8px;          /* default — cards, buttons, modals */\n  --border-radius-small: 4px;    /* small UI, checkboxes (= radius / 2) */\n  --border-radius-inner: 6px;    /* chips, inline code, inner elements */\n  --border-width: 2px;\n\n  --gap: 16px;                   /* 4 × grid */\n  --gap-half: 8px;\n  --gap-double: 32px;\n  --layout-gap: 32px;\n  --transition-duration: 0.15s; /* @kind other */\n\n  /* ---------- Brand ---------- */\n  --color-cc-blue:        #034ad8;\n  --color-neptune:        #034ad8;\n  --color-neptune-hover:  #243da8;\n  --color-double-cc-blue: #0015b7;\n  --color-comet:          #8bb4ed;\n  --color-luna:           #f0f5ff;   /* tinted brand background */\n  --color-space:          #354361;   /* deep navy ink (tab active text) */\n\n  /* ---------- Greys ramp (never pure black) ---------- */\n  --color-cloud:       #ffffff;\n  --color-stratus:     #eeeeee;\n  --color-cirrus:      #e0e0e0;\n  --color-alto:        #cfcfcf;   /* signature 2px border */\n  --color-nimbus-alto: #999999;   /* mid grey — disabled icons, captions */\n  --color-nimbus:      #616161;   /* secondary text, border hover */\n  --color-carbon:      #393939;   /* body text — the darkest we go */\n\n  /* ---------- Semantic ---------- */\n  --color-emerald:    #38a413;   --color-emerald-10: #ebf6e7;  /* success */\n  --color-ruby:       #cf352f;   --color-ruby-10:    #ffe7ea;  /* error / danger */\n  --color-amber:      #fc6d26;   --color-amber-10:   #ffede5;  /* warning */\n  --color-sol:        #f7e064;   --color-sol-light:  #fffbe4;  /* highlight / upgrade */\n  --color-advanced:   #c703d8;                                 /* advanced / premium */\n\n  /* tier + provider accents */\n  --color-gold: #c9b25f;  --color-silver: #c0c0c0;  --color-bronze: #f4a34e;  --color-platinum: #b9c8e6;\n  --color-github: #393939;  --color-bitbucket: #0052cc;  --color-gitlab: #fc6d26;\n\n  /* ---------- Derivative roles ---------- */\n  --color-text:    var(--color-carbon);\n  --color-brand:   var(--color-cc-blue);\n  --color-brand-light: color-mix(in srgb, var(--color-brand) 6%, var(--color-cloud));\n  --color-brand-dark:  color-mix(in srgb, var(--color-brand) 80%, var(--color-carbon));\n  --color-info:    var(--color-cc-blue);\n  --color-error:   var(--color-ruby);\n  --color-warning: var(--color-amber);\n  --color-success: var(--color-emerald);\n  --color-disabled: var(--color-nimbus);\n\n  --border-color:                 var(--color-alto);\n  --border-color-clickable:       var(--color-alto);\n  --border-color-clickable-hover: var(--color-nimbus);\n  --border-color-clickable-focus: var(--color-nimbus);\n  --border-color-clickable-active:var(--color-carbon);\n  --border-color-error:           var(--color-ruby);\n\n  --background-color:         var(--color-cloud);\n  --background-color-info:    var(--color-luna);\n  --background-color-error:   var(--color-ruby-10);\n  --background-color-warning: var(--color-amber-10);\n  --background-color-success: var(--color-emerald-10);\n\n  --border:       var(--border-width) solid var(--border-color);\n  --border-brand: var(--border-width) solid var(--color-brand);\n\n  /* ---------- Focus + elevation ---------- */\n  /* The signature focus ring: an 8px BLURRED box-shadow (no spread), never an outline. */\n  --box-shadow-width-clickable-focus: 8px;\n  --box-shadow-clickable-focus: 0 0 8px var(--color-alto);\n  /* The one shadow in the system — the white content \"paper\" floating on the blue shell. */\n  --box-shadow-paper: 0 0 40px rgb(51 51 51 / 10%);\n\n  /* ---------- Typography ---------- */\n  --font-family: -apple-system, BlinkMacSystemFont, \"Segoe UI\", \"Noto Sans\", Arial, Helvetica, sans-serif, \"Apple Color Emoji\", \"Segoe UI Emoji\";\n  --font-family-monospace: ui-monospace, SFMono-Regular, \"SF Mono\", Menlo, Consolas, \"Liberation Mono\", monospace;\n\n  --font-size-root: 15.5px;\n  --font-size-largest:       2.19rem;  /* h1 */\n  --font-size-larger:        2.06rem;  /* h2 */\n  --font-size-large:         1.55rem;  /* h3 */\n  --font-size-medium:        1.29rem;  /* h4 */\n  --font-size-medium-small:  1.1rem;   /* h5 */\n  --font-size-normal:        1rem;     /* body, h6 */\n  --font-size-small:         0.9rem;\n  --font-size-smaller:       0.8rem;\n  --font-size-smallest:      0.7rem;\n  --font-size-monospace-large:   0.95rem;\n  --font-size-monospace:         0.875rem;\n  --font-size-monospace-small:   0.8rem;\n  --font-size-monospace-smaller: 0.7rem;\n\n  --font-weight:          400;\n  --font-weight-semibold: 500;\n  --font-weight-bold:     600;   /* used for headings, labels, button text */\n\n  --line-height:       1.75;     /* body */\n  --line-height-small: 1.5;\n\n  --input-padding-vertical:   8px;   /* 2 × grid */\n  --input-padding-horizontal: 12px;  /* 3 × grid */\n\n  /* ============================================================\n     Convenience aliases (used by the spec cards / UI kit)\n     ============================================================ */\n  --cc-blue:       var(--color-cc-blue);\n  --cc-blue-hover: var(--color-neptune-hover);\n  --cc-luna:       var(--color-luna);\n  --cloud: var(--color-cloud);  --stratus: var(--color-stratus);  --cirrus: var(--color-cirrus);\n  --alto: var(--color-alto);    --nimbus-alto: var(--color-nimbus-alto);\n  --nimbus: var(--color-nimbus);  --carbon: var(--color-carbon);\n  --sol: var(--color-sol);\n  --emerald: var(--color-emerald);  --emerald-bg: var(--color-emerald-10);\n  --ruby: var(--color-ruby);        --ruby-bg: var(--color-ruby-10);\n  --amber: var(--color-amber);      --amber-bg: var(--color-amber-10);\n\n  --fg1: var(--color-carbon);  --fg2: var(--color-nimbus);\n  --bg1: var(--color-cloud);   --bg2: var(--color-stratus);\n\n  --font-sans: var(--font-family);\n  --font-mono: var(--font-family-monospace);\n\n  --t-xs:   var(--font-size-smallest);     /* 0.70rem */\n  --t-sm:   var(--font-size-smaller);      /* 0.80rem */\n  --t-base: var(--font-size-normal);       /* 1rem    */\n  --t-md:   var(--font-size-medium-small); /* 1.10rem */\n  --t-lg:   var(--font-size-medium);       /* 1.29rem */\n  --t-xl:   var(--font-size-large);        /* 1.55rem */\n  --t-2xl:  var(--font-size-larger);       /* 2.06rem */\n  --t-3xl:  var(--font-size-largest);      /* 2.19rem */\n\n  --fw-regular: 400;  /* @kind font */\n  --fw-medium: 500;   /* @kind font */\n  --fw-semibold: 600; /* @kind font */\n  --lh-body: 1.75;    /* @kind font */\n  --lh-heading: 1.4;  /* @kind font */\n\n  --gap-quarter: 4px;  --gap-onehalf: 24px;  --gap-triple: 48px;\n\n  --radius:       8px;   --radius-chip: 6px;   --radius-small: 4px;   --radius-pill: 999px;\n  --border-quiet: 1px solid var(--color-cirrus);\n  --border-hover: var(--border-width) solid var(--color-nimbus);\n  --focus-ring:       var(--box-shadow-clickable-focus);\n  --focus-ring-brand: 0 0 8px var(--color-brand);\n  --transition: 0.15s ease; /* @kind other */\n}\n\n/* ============================================================\n   Semantic element defaults\n   ============================================================ */\n\nhtml { font-size: var(--fon "font-size:16px;\">{{ item.helpIcon }}<\u002Fspan>How to choose<\u002Fbutton>\n                        <\u002Fdiv>\n                        <sc-if value=\"{{ item.helpOpen }}\">\n                          <div style=\"{{ item.helpCalloutStyle }}\">\n                            <div style=\"display:flex;align-items:flex-start;gap:9px;\"><span style=\"width:9px;height:9px;border-radius:50%;background:#034ad8;flex:none;margin-top:5px;\"><\u002Fspan><span><strong style=\"color:#034ad8;\">Use current<\u002Fstrong> — keep your edit on <span style=\"font-family:var(--font-mono);\">staging<\u002Fspan> and discard main's version of this line.<\u002Fspan><\u002Fdiv>\n                            <div style=\"display:flex;align-items:flex-start;gap:9px;\"><span style=\"width:9px;height:9px;border-radius:50%;background:#1f7a10;flex:none;margin-top:5px;\"><\u002Fspan><span><strong style=\"color:#1f7a10;\">Use incoming<\u002Fstrong> — take the change from <span style=\"font-family:var(--font-mono);\">main<\u002Fspan> and drop your version of this line.<\u002Fspan><\u002Fdiv>\n                            <div style=\"display:flex;align-items:flex-start;gap:9px;\"><span class=\"material-symbols-outlined\" style=\"font-size:17px;color:#616161;flex:none;\">call_merge<\u002Fspan><span><strong>Keep both<\u002Fstrong> — stack your version and main's, one after the other.<\u002Fspan><\u002Fdiv>\n                            <div style=\"display:flex;align-items:flex-start;gap:9px;\"><span class=\"material-symbols-outlined\" style=\"font-size:17px;color:#616161;flex:none;\">edit<\u002Fspan><span><strong>Edit<\u002Fstrong> — type the exact merged result yourself.<\u002Fspan><\u002Fdiv>\n                          <\u002Fdiv>\n                        <\u002Fsc-if>\n                        <div style=\"max-height:380px;overflow:auto;padding:8px 0;\">\n                          <sc-for list=\"{{ item.blocks }}\" as=\"b\" hint-placeholder-count=\"3\">\n                            <sc-if value=\"{             <span class=\"material-symbols-outlined\" style=\"font-size:15px;color:{{ b.resChipIconColor }};\">{{ b.chipIcon }}<\u002Fspan>{{ b.chipText }}\n                                      <span style=\"flex:1;\"><\u002Fspan>\n                                      <sc-if value=\"{{ b.isManual }}\"><button onclick=\"{{ b.onEditAgain }}\" style=\"{{ b.resChangeStyle }}\">Edit again<\u002Fbutton><\u002Fsc-if>\n                                      <button onclick=\"{{ b.onChange }}\" style=\"{{ b.resChangeStyle }}\">Change<\u002Fbutton>\n                                      <sc-if value=\"{{ b.hasNextConflict }}\"><button onclick=\"{{ b.onNextConflict }}\" style=\"{{ b.nextInlineStyle }}\">{{ b.nextLabel }}<span class=\"material-symbols-outlined\" style=\"font-size:15px;\">arrow_forward<\u002Fspan><\u002Fbutton><\u002Fsc-if>\n                                    <\u002Fdiv>\n                                    <sc-for list=\"{{ b.lines }}\" as=\"ln\" hint-placeholder-count=\"1\">\n                                      <div style=\"{{ ln.rowStyle }}\">\n                                        <span style=\"{{ ln.gutterStyle }}\">{{ ln.num }}<\u002Fspan>\n                                        <span style=\"{{ ln.textStyle }}\"><span style=\"{{ ln.preStyle }}\">{{ ln.pre }}<\u002Fspan>{{ ln.val }}<\u002Fspan>\n                                      <\u002Fdiv>\n                                    <\u002Fsc-for>\n                                  <\u002Fdiv>\n                                <\u002Fsc-if>\n                              <\u002Fdiv>\n                            <\u002Fsc-if>\n                          <\u002Fsc-for>\n                        <\u002Fdiv>\n                      <\u002Fdiv>\n                    <\u002Fsc-if>\n\n                    <sc-if value=\"{{ item.isImage }}\">\n                      <div data-conflict-key=\"{{ item.wholeKey }}\" style=\"display:grid;grid-template-columns:1fr 1fr;gap:14px;\">\n                        <div onclick=\"{{ item.onKeep }}\" style=\"{{ item.imgCurCardStyle }}\">\n                          <div style=\"display:flex;align-items:center;gap:8px;padding:8px 12px;border-bottom:1px solid #eeeeee;\">\n                            <span style=\"width:8px;height:8px;border-radius:50%;background:#034ad8;flex:none;\"><\u002Fspan>\n                            <span style=\"font-size:0.82rem;font-weight:600;\">Your version<\u002Fspan>\n                            <span style=\"display:inline-flex;font-family:var(--font-mono);font-size:0.7rem;font-weight:600;background:#fff;color:#034ad8;border:1px solid #bcd2f5;padding:0 6px;border-radius:5px;\">staging<\u002Fspan>\n                            <sc-if value=\"{{ item.curSel }}\"><span style=\"margin-left:auto;display:inline-flex;align-items:center;gap:3px;font-size:0.72rem;font-weight:600;color:#034ad8;\"><span class=\"material-symbols-outlined\" style=\"font-size:16px;\">check_circle<\u002Fspan>Selected<\u002Fspan><\u002Fsc-if>\n                          <\u002Fdiv>\n                          <div role=\"img\" aria-label=\"Your version\" style=\"{{ item.imgCurStyle }}\"><\u002Fdiv>\n                        <\u002Fdiv>\n                        <div onclick=\"{{ item.onIncoming }}\" style=\"{{ item.imgIncCardStyle }}\">\n                          <div style=\"display:flex;align-items:center;gap:8px;padding:8px 12px;border-bottom:1px solid #eeeeee;\">\n                            <span style=\"width:8px;height:8px;border-radius:50%;background:#38a413;flex:none;\"><\u002Fspan>\n                            <span style=\"font-size:0.82rem;font-weight:600;\">Incoming<\u002Fspan>\n                            <span style=\"display:inline-flex;font-family:var(--font-mono);font-size:0.7rem;font-weight:600;background:#fff;color:#38a413;border:1px solid #b9dca8;padding:0 6px;border-radius:5px;\">main<\u002Fspan>\n                            <sc-if value=\"{{ item.incSel }}\"><span style=\"margin-left:auto;display:inline-flex;align-items:center;gap:3px;font-size:0.72rem;font-weight:600;color:#034ad8;\"><span class=\"material-symbols-outlined\" style=\"font-size:16px;\">check_circle<\u002Fspan>Selected<\u002Fspan><\u002Fsc-if>\n                          <\u002Fdiv>\n                          <div role=\"img\" aria-label=\"Incoming version\" style=\"{{ item.imgIncStyle }}\"><\u002Fdiv>\n                        <\u002Fdiv>\n                      <\u002Fdiv>\n                      <p style=\"font-size:0.84rem;color:#616161;margin:14px 0 0;line-height:1.55;\">Click a version to keep it. Images can't be blended — you choose one whole file. Need a different image entirely? Resolve here, then swap it in the editor.<\u002Fp>\n                      <sc-if value=\"{{ item.wholeResolved }}\">\n                        <div style=\"margin-top:14px;padding-top:13px;border-top:1px solid #eeeeee;display:flex;align-items:center;gap:12px;flex-wrap:wrap;\">\n                          <span style=\"display:inline-flex;align-items:center;gap:6px;font-size:0.85rem;font-weight:600;color:#1f7a10;\"><span class=\"material-symbols-outlined\" style=\"font-size:18px;\">task_alt<\u002Fspan>{{ item.wholeResolvedNote }}<\u002Fspan>\n                          <sc-if value=\"{{ item.hasWholeNext }}\"><button onclick=\"{{ item.onWholeNext }}\" style=\"{{ item.wholeNextStyle }}\">{{ item.wholeNextLabel }}<span class=\"material-symbols-outlined\" style=\"font-size:16px;\">arrow_forward<\u002Fspan><\u002Fbutton><\u002Fsc-if>\n                        <\u002Fdiv>\n                      <\u002Fsc-if>\n                    <\u002Fsc-if>\n\n                    <sc-if value=\"{{ item.isDelete }}\">\n                      <div data-conflict-key=\"{{ item.wholeKey }}\" style=\"display:grid;grid-template-columns:1fr 1fr;gap:14px;align-items:stretch;\">\n                        <div onclick=\"{{ item.onKeep }}\" style=\"{{ item.delKeepCardStyle }}\">\n                          <div style=\"display:flex;align-items:center;gap:8px;padding:8px 12px;background:#eef3fe;border-bottom:1px solid #d3e0fa;\">\n                            <span class=\"material-symbols-outlined\" style=\"font-size:18px;color:#034ad8;\">edit<\u002Fspan>\n                            <span style=\"font-size:0.82rem;font-weight:600;\">You edited this file<\u002Fspan>\n                            <span style=\"margin-left:auto;font-family:var(--font-mono);font-size:0.7rem;color:#999;\">{{ item.youAuthor }} · {{ item.youSha }}<\u002Fspan>\n                          <\u002Fdiv>\n                          <div style=\"padding:10px 13px;font-family:var(--font-mono);font-size:0.82rem;line-height:1.7;color:#393939;\"><sc-for list=\"{{ item.diffCurrent }}\" as=\"ln\" hint-placeholder-count=\"3\"><div style=\"min-height:1.2em;white-space:pre-wrap;\">{{ ln }}<\u002Fdiv><\u002Fsc-for><\u002Fdiv>\n                          <div style=\"padding:8px 13px 12px;font-size:0.78rem;color:#616161;border-top:1px solid #eeeeee;\">Keeping it restores the file with your changes.<\u002Fdiv>\n                        <\u002Fdiv>\n                        <div onclick=\"{{ item.onIncoming }}\" style=\"{{ item.delDelCardStyle }}\">\n                          <div style=\"display:flex;align-items:center;gap:8px;padding:8px 12px;background:#eeeeee;border-bottom:1px solid #e0e0e0;\">\n                            <span class=\"material-symbols-outlined\" style=\"font-size:18px;color:#616161;\">delete<\u002Fspan>\n                            <span style=\"font-size:0.82rem;font-weight:600;\">Deleted on main<\u002Fspan>\n                            <span style=\"margin-left:auto;font-family:var(--font-mono);font-size:0.7rem;color:#999;\">{{ item.themAuthor }} · {{ item.themSha }}<\u002Fspan>\n                          <\u002Fdiv>\n                          <div style=\"padding:26px 13px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;text-align:center;color:#999;\">\n                            <span class=\"material-symbols-outlined\" style=\"font-size:34px;color:#cfcfcf;\">delete_forever<\u002Fspan>\n                            <span style=\"font-family:var(--font-mono);font-size:0.82rem;text-decoration:line-through;color:#999;\">{{ item.name }}<\u002Fspan>\n                            <span style=\"font-size:0.78rem;\">This file no longer exists on main.<\u002Fspan>\n                          <\u002Fdiv>\n                          <div style=\"padding:8px 13px 12px;font-size:0.78rem;color:#616161;border-top:1px solid #e0e0e0;\">Accepting the deletion removes the file from your site.<\u002Fdiv>\n                        <\u002Fdiv>\n                      <\u002Fdiv>\n                      <p style=\"font-size:0.84rem;color:#616161;margin:14px 0 0;line-height:1.55;\">This is an edit/delete conflict — there's no text to merge. Keep your edited file, or accept that it was intentionally removed on <span style=\"font-family:var(--font-mono);color:#034ad8;\">main<\u002Fspan>.<\u002Fp>\n                      <sc-if value=\"{{ item.wholeResolved }}\">\n                        <div style=\"margin-top:14px;padding-top:13px;border-top:1px solid #eeeeee;display:flex;align-items:center;gap:12px;flex-wrap:wrap;\">\n                          <span style=\"display:inline-flex;align-items:center;gap:6px;font-size:0.85rem;font-weight:600;color:#1f7a10;\"><span class=\"material-symbols-outlined\" style=\"font-size:18px;\">task_alt<\u002Fspan>{{ item.wholeResolvedNote }}<\u002Fspan>\n                          <sc-if value=\"{{ item.hasWholeNext }}\"><button onclick=\"{{ item.onWholeNext }}\" style=\"{{ item.wholeNextStyle }}\">{{ item.wholeNextLabel }}<span class=\"material-symbols-outlined\" style=\"font-size:16px;\">arrow_forward<\u002Fspan><\u002Fbutton><\u002Fsc-if>\n                        <\u002Fdiv>\n                      <\u002Fsc-if>\n                    <\u002Fsc-if>\n                  <\u002Fdiv>\n                <\u002Fsc-if>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <sc-if value=\"{{ isDone }}\">\n        <div style=\"max-width:640px;margin:0 auto;padding:90px 28px;text-align:center;\">\n          <div style=\"width:74px;height:74px;border-radius:50%;background:#ebf6e7;display:inline-flex;align-items:center;justify-content:center;margin-bottom:22px;\"><span class=\"material-symbols-outlined\" style=\"font-size:42px;color:#38a413;font-variation-settings:'FILL' 1;\">check<\u002Fspan><\u002Fdiv>\n          <h2 style=\"font-size:1.55rem;margin:0 0 10px;\">All conflicts resolved<\u002Fh2>\n          <p style=\"color:#616161;line-height:1.65;margin:0 0 28px;\">CloudCannon updated <span style=\"display:inline-flex;align-items:center;font-family:var(--font-mono);font-size:0.74rem;font-weight:600;background:#f0f5ff;color:#034ad8;border:1px solid #cfe0fb;padding:0 7px;border-radius:6px;\">staging<\u002Fspan> from <span style=\"display:inline-flex;align-items:center;font-family:var(--font-mono);font-size:0.74rem;font-weight:600;background:#f0f5ff;color:#034ad8;border:1px solid #cfe0fb;padding:0 7px;border-radius:6px;\">main<\u002Fspan>, including your resolved files and all unaffected changes. You can keep editing and publish as normal.<\u002Fp>\n          <div style=\"display:flex;gap:12px;justify-content:center;\">\n            <x-import component-from-global-scope=\"Button\" look=\"outline\" variant=\"plain\" icon=\"replay\" onclick=\"{{ onReset }}\" hint-size=\"auto,48px\">Run the demo again<\u002Fx-import>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n    <\u002Fdiv>\n  <\u002Fmain>\n\n  <sc-if value=\"{{ showNav }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"position:fixed;left:50%;bottom:26px;transform:translateX(-50%);z-index:40;display:flex;align-items:center;gap:4px;background:#fff;border:2px solid #d6d9de;border-radius:999px;padding:6px 8px 6px 16px;box-shadow:0 10px 30px rgba(51,51,51,0.18);\">\n      <span class=\"material-symbols-outlined\" style=\"font-size:20px;color:{{ navIconColor }};\">{{ navIcon }}<\u002Fspan>\n      <span style=\"font-size:0.9rem;font-weight:600;color:#393939;white-space:nowrap;\">{{ navResolvedText }}<\u002Fspan>\n      <span style=\"width:1px;height:26px;background:#e6e6e6;margin:0 8px;\"><\u002Fspan>\n      <sc-if value=\"{{ navAllDone }}\">\n        <button onclick=\"{{ onNavUpdate }}\" style=\"display:inline-flex;align-items:center;gap:6px;height:38px;padding:0 18px;border:2px solid #034ad8;background:#034ad8;color:#fff;border-radius:999px;font-family:inherit;font-weight:600;font-size:0.9rem;cursor:pointer;\">Update from main<span class=\"material-symbols-outlined\" style=\"font-size:20px;\">cloud_upload<\u002Fspan><\u002Fbutton>\n      <\u002Fsc-if>\n      <sc-if value=\"{{ navHasUnresolved }}\">\n        <button onclick=\"{{ onNavPrev }}\" title=\"Previous conflict (P)\" style=\"width:38px;height:38px;display:inline-flex;align-items:center;justify-content:center;border:2px solid #e0e0e0;background:#fff;color:#616161;border-radius:50%;cursor:pointer;\"><span class=\"material-symbols-outlined\" style=\"font-size:20px;\">arrow_upward<\u002Fspan><\u002Fbutton>\n        <button onclick=\"{{ onNavNext }}\" title=\"Next unresolved conflict (N)\" style=\"display:inline-flex;align-items:center;gap:6px;height:38px;padding:0 16px 0 18px;border:2px solid #034ad8;background:#034ad8;color:#fff;border-radius:999px;font-family:inherit;font-weight:600;font-size:0.9rem;cursor:pointer;white-space:nowrap;\">{{ navNextLabel }}<span class=\"material-symbols-outlined\" style=\"font-size:20px;\">arrow_forward<\u002Fspan><\u002Fbutton>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <sc-if value=\"{{ confirmShown }}\" hint-placeholder-val=\"{{ false }}\">\n    <div onclick=\"{{ onConfirmCancel }}\" style=\"position:fixed;inset:0;z-index:50;display:flex;align-items:center;justify-content:center;background:rgba(28,28,32,0.38);padding:24px;\">\n      <div onclick=\"{{ onModalStop }}\" style=\"background:#fff;border:2px solid #e0e0e0;border-radius:8px;max-width:460px;width:100%;overflow:hidden;box-shadow:0 14px 44px rgba(51,51,51,0.2);\">\n        <div style=\"display:flex;align-items:flex-start;gap:13px;padding:22px 24px 0;\">\n          <div style=\"width:42px;height:42px;border-radius:8px;background:#fdf3e3;color:#b46e00;display:flex;align-items:center;justify-content:center;flex:none;\"><span class=\"material-symbols-outlined\" style=\"font-size:24px;\">warning<\u002Fspan><\u002Fdiv>\n          <h3 style=\"margin:6px 0 0;font-size:1.29rem;line-height:1.3;\">{{ confirmTitle }}<\u002Fh3>\n        <\u002Fdiv>\n        <p style=\"margin:14px 24px 0;color:#616161;line-height:1.65;font-size:0.95rem;\">{{ confirmBody }}<\u002Fp>\n        <div style=\"display:flex;justify-content:flex-end;gap:10px;padding:22px 24px 22px;\">\n          <button onclick=\"{{ onConfirmCancel }}\" style=\"display:inline-flex;align-items:center;height:44px;padding:0 18px;border:2px solid #e0e0e0;background:#fff;color:#393939;border-radius:8px;font-family:inherit;font-weight:600;font-size:0.95rem;cursor:pointer;\">Cancel<\u002Fbutton>\n          <button onclick=\"{{ onConfirmOk }}\" style=\"{{ confirmOkStyle }}\"><span class=\"material-symbols-outlined\" style=\"font-size:20px;\">{{ confirmOkIcon }}<\u002Fspan>{{ confirmOkLabel }}<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = { view: 'dashboard', layout: 'cards', diffTheme: 'light', res: {}, expanded: {}, editorId: null, hunks: {}, manual: {}, editing: {}, draft: {}, help: {}, activeHunk: 0, sidebarOpen: true, confirm: null, confirmFile: null, flash: null, activeKey: null };\n\n  componentDidMount() {\n    // Open the first conflict for the user so they don't start on a wall of collapsed cards.\n    const first = this.data && this.data[0];\n    const list = this.conflictList
